  /api/v1/articles/:
    get:
      operationId: api_v1_articles_list
      description: Retrieve a list of all articles. Supports filtering, searching,
        and ordering.
      summary: List all articles
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: is_featured
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - archived
          - draft
          - published
          - review
        description: |-
          * `draft` - Draft
          * `review` - In Review
          * `published` - Published
          * `archived` - Archived
      tags:
      - Articles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticleList'
          description: ''
    post:
      operationId: api_v1_articles_create
      description: Create a new article. Requires authentication and appropriate permissions.
      summary: Create a new article
      tags:
      - Articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Article'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Article'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Article'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
  /api/v1/articles/{slug}/:
    get:
      operationId: api_v1_articles_retrieve
      description: Get the details of a specific article by its slug.
      summary: Retrieve an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Articles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
    put:
      operationId: api_v1_articles_update
      description: Update an existing article. Requires authentication and appropriate
        permissions.
      summary: Update an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Article'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Article'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Article'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
    patch:
      operationId: api_v1_articles_partial_update
      description: Partially update an existing article. Requires authentication and
        appropriate permissions.
      summary: Partially update an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedArticle'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedArticle'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedArticle'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
    delete:
      operationId: api_v1_articles_destroy
      description: Delete an existing article. Requires authentication and appropriate
        permissions.
      summary: Delete an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Articles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/articles/{slug}/publish/:
    post:
      operationId: api_v1_articles_publish_create
      description: Publish a draft article. Only users with admin, editor, or superadmin
        roles can publish articles.
      summary: Publish an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Article'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Article'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Article'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
  /api/v1/articles/{slug}/unpublish/:
    post:
      operationId: api_v1_articles_unpublish_create
      description: Unpublish a published article. Only users with admin, editor, or
        superadmin roles can unpublish articles.
      summary: Unpublish an article
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
