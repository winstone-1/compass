        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: ''
  /mpesa/stk-push/:
    post:
      operationId: mpesa_stk_push_create
      tags:
      - mpesa
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        author_name:
          type: string
          readOnly: true
        category_name:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        featured_image:
          type: string
          nullable: true
          title: Image
        excerpt:
          type: string
          nullable: true
        content:
          type: string
        view_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_featured:
          type: boolean
        status:
          $ref: '#/components/schemas/StatusEnum'
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        author:
          type: integer
        category:
          type: integer
          nullable: true
      required:
      - author
      - author_name
      - category_id
      - category_name
      - content
      - created_at
      - id
      - slug
      - title
      - updated_at
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    EmailTokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    PaginatedArticleList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Article'
    PaginatedUserList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'
    PatchedArticle:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        author_name:
          type: string
          readOnly: true
        category_name:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        category_id:
          type: integer
          writeOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        featured_image:
          type: string
          nullable: true
          title: Image
        excerpt:
          type: string
          nullable: true
        content:
          type: string
        view_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_featured:
          type: boolean
        status:
          $ref: '#/components/schemas/StatusEnum'
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        author:
          type: integer
        category:
          type: integer
          nullable: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        full_name:
          type: string
          readOnly: true
        phone:
          type: string
          nullable: true
          maxLength: 20
        profile_picture:
          type: string
          nullable: true
          title: Image
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
    RoleEnum:
      enum:
      - reader
      - journalist
      - editor
      - admin
      - superadmin
      type: string
      description: |-
        * `reader` - Reader
