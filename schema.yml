openapi: 3.0.3
info:
  title: News API
  version: 1.0.0
  description: "A news API built with Django REST Framework\n    \n    Features:\n
    \   - User registration and authentication\n    - CRUD operations for news articles\n
    \   - Article categorization and filtering\n    - Article filtering, searching,
    and ordering\n    - API documentation with drf-spectacular\n    - Cloudinary integration
    for image uploads\n    - Comprehensive documentation with drf-spectacular\n    "
paths:
  /api/schema/:
    get:
      operationId: api_schema_retrieve
