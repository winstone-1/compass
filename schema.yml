  /api/v1/accounts/auth/login/:
    post:
      operationId: api_v1_accounts_auth_login_create
      description: Authenticate a user and obtain JWT tokens.
      summary: Login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTokenObtainPair'
          description: ''
  /api/v1/accounts/auth/register/:
    post:
      operationId: api_v1_accounts_auth_register_create
      description: Register a new user account.
      summary: Register
      tags:
      - Authentication
      security:
